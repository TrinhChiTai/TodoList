<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Job List</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >

</head>

<body class="bg-gray-100">

    <div class="max-w-5xl mx-auto mt-10">

        <h1
            class="text-5xl font-bold text-center mb-8"
        >

            Job List

        </h1>

        <div
            class="bg-white rounded-xl shadow-lg p-6"
        >

            <div class="grid md:grid-cols-2 gap-4">

                <input
                    id="title"
                    type="text"
                    maxlength="100"
                    placeholder="Title"
                    class="border rounded-lg p-3"
                >

                <input
                    id="description"
                    type="text"
                    maxlength="500"
                    placeholder="Description"
                    class="border rounded-lg p-3"
                >

            </div>

            <button
                id="saveBtn"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg mt-5"
            >

                Add Job

            </button>

        </div>

        <div class="bg-white mt-6 rounded-xl shadow-lg p-5">

            <div class="grid md:grid-cols-3 gap-3">

                <input
                    id="search"
                    type="text"
                    placeholder="Search..."
                    class="border rounded-lg p-3"
                >

                <select
                    id="filter"
                    class="border rounded-lg p-3"
                >

                    <option value="all">

                        All

                    </option>

                    <option value="completed">

                        Completed

                    </option>

                    <option value="pending">

                        Pending

                    </option>

                </select>

                <select
                    id="sort"
                    class="border rounded-lg p-3"
                >

                    <option value="newest">

                        Newest

                    </option>

                    <option value="oldest">

                        Oldest

                    </option>

                    <option value="az">

                        A-Z

                    </option>

                    <option value="za">

                        Z-A

                    </option>

                </select>

            </div>

        </div>

        <div
            id="todo-list"
            class="mt-6"
        >

        </div>

        <div
            id="pagination"
            class="flex justify-center mt-8 gap-2"
        >

        </div>

    </div>

    <div
        id="toast"
        class="hidden fixed top-5 right-5 bg-green-600 text-white px-6 py-3 rounded-lg"
    >

        Saved

    </div>

    <div
        id="deleteModal"
        class="hidden fixed inset-0 bg-black/40 flex items-center justify-center"
    >

        <div
            class="bg-white rounded-xl p-6 w-96"
        >

            <h2 class="text-2xl font-bold">

                Delete Job

            </h2>

            <p class="mt-3">

                Are you sure?

            </p>

            <div class="flex justify-end gap-3 mt-6">

                <button
                    id="cancelDelete"
                    class="px-4 py-2 border rounded"
                >

                    Cancel

                </button>

                <button
                    id="confirmDelete"
                    class="px-4 py-2 bg-red-600 text-white rounded"
                >

                    Delete

                </button>

            </div>

        </div>

    </div>

    <script src="/static/js/script.js"></script>

</body>

</html>
